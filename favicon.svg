<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#111008"/>
  <rect x="1" y="1" width="62" height="62" rx="9" fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.6"/>
  <!-- Sword vertical -->
  <line x1="32" y1="8" x2="32" y2="48" stroke="#c9a227" stroke-width="3" stroke-linecap="round"/>
  <!-- Crossguard -->
