  <line x1="200" y1="330" x2="1000" y2="330" stroke="#c9a227" stroke-width="0.8" opacity="0.3"/>
  <text x="600" y="326" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#111008" letter-spacing="2">⚔</text>
  <rect x="580" y="313" width="40" height="18" fill="#111008"/>
  <text x="600" y="326" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#c9a227" opacity="0.5">⚔</text>

