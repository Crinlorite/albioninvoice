  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="4" fill="none" stroke="#2a2215" stroke-width="1"/>
  <rect x="30" y="30" width="1140" height="570" rx="3" fill="none" stroke="#c9a227" stroke-width="0.5" opacity="0.25"/>

